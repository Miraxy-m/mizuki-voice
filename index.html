<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Understanding Identity</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background-image:url("Mizuki_43_art.png");
    background-size:cover;
    background-position:center;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

.overlay{
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.title{
    color:white;
    font-size:3rem;
    margin-bottom:10px;
    text-shadow:0 0 15px black;
}

.subtitle{
    color:white;
    margin-bottom:50px;
    text-shadow:0 0 10px black;
}

.start-btn{
    width:260px;
    padding:18px;

    border:none;
    border-radius:30px;

    font-size:1.5rem;
    cursor:pointer;

    background:white;
    transition:0.25s;
}

.start-btn:hover{
    transform:scale(1.08);
}

.menu{
    margin-top:25px;
    display:flex;
    gap:15px;
}

.menu button{
    padding:12px 25px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    transition:0.25s;
}

.menu button:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<audio id="bgm" loop>
    <source src="Res020_no043.mp3" type="audio/mpeg">
</audio>

<div class="overlay">

```

</div>

</div>

</button>

<div class="menu">

        CHARACTER
    </button>

    </button>
</div>
```

<script>

    document.getElementById("bgm").play();
    location.href="story.html";
}
